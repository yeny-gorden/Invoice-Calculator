<!DOCTYPE html>
<html lang="id">
<head>
	<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden - Yeny Gorden</title>
    
    <style>
        *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 2rem 1rem; min-height: 100vh; }
        .max-w-4xl { max-width: 56rem; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(12, minmax(0, 1fr)); } .col-form { grid-column: span 7; } .col-list { grid-column: span 5; } }
        .bg-slate-800 { background-color: #1e293b; padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(51, 65, 85, 0.5); }
        .bg-slate-900 { background-color: #0f172a; }
        .text-center { text-align: center; }
        .text-indigo-400 { color: #818cf8; }
        .text-emerald-400 { color: #34d399; }
        .text-white { color: #fff; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .font-bold { font-weight: 700; }
        .w-full { width: 100%; }
        .rounded-xl { border-radius: 0.75rem; }
        .p-3 { padding: 0.75rem; } .p-4 { padding: 1rem; }
        .mb-4 { margin-bottom: 1rem; } .mb-2 { margin-bottom: 0.5rem; } .mt-2 { margin-top: 0.5rem; }
        .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
        .hidden { display: none !important; }
        .border-dashed { border-style: dashed; border-width: 2px; border-color: #334155; }
        
        input, select { width: 100%; bg-color: #0f172a; border: 1px solid #334155; border-radius: 0.75rem; padding: 0.75rem; color: white; font-weight: 500; font-size: 1rem; background: #0f172a; }
        input:focus, select:focus { border-color: #818cf8; outline: none; }
        .relative { position: relative; }
        .absolute-right { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; }
        
        .btn-hitung { background: #4f46e5; color: white; font-weight: 700; padding: 1rem; border-radius: 0.75rem; width: 100%; cursor: pointer; font-size: 1.125rem; margin-top: 1rem; }
        .btn-hitung:hover { background: #4338ca; }
        .btn-proses { background: #059669; color: white; font-weight: 700; padding: 0.75rem; border-radius: 0.75rem; width: 100%; cursor: pointer; margin-top: 1rem; }
        .btn-proses:hover { background: #047857; }
        
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
        .toggle-bg { width: 2.75rem; height: 1.5rem; background: #334155; border-radius: 9999px; relative; position: relative; cursor: pointer; }
        .toggle-bg::after { content: ''; position: absolute; top: 2px; left: 2px; background: #cbd5e1; width: 1.25rem; height: 1.25rem; border-radius: 50%; transition: all 0.2s; }
        input:checked + .toggle-bg { background: #4f46e5; }
        input:checked + .toggle-bg::after { left: 22px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="max-w-4xl">
        <div class="text-center mb-4">
            <span class="bg-indigo-950 text-indigo-400 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider border border-indigo-900">Yeny Gorden Internal App</span>
            <h1 class="text-white font-bold mt-2" style="font-size: 2rem;">Kalkulator Hitung Gorden</h1>
            <p style="color: #94a3b8; margin-top: 0.25rem;">Hitung otomatis pemakaian bahan & aksesoris jendela sebelum invoice dibuat</p>
        </div>

        <div class="grid">
            <!-- Form Input -->
            <div class="col-form bg-slate-800">
                <h2 class="text-white font-bold mb-4" style="font-size: 1.125rem;"><i class="fa-solid fa-sliders text-indigo-400"></i> Input Dimensi Jendela</h2>
                <div class="flex gap-4 mb-4" style="gap: 1rem;">
                    <div style="flex: 1;">
                        <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Lebar Kusen (m)</label>
                        <div class="relative">
                            <input type="number" id="lebar" step="0.01" placeholder="1.50">
                            <span class="absolute-right">m</span>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Tinggi Kusen (m)</label>
                        <div class="relative">
                            <input type="number" id="tinggi" step="0.01" placeholder="2.50">
                            <span class="absolute-right">m</span>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Kain Utama</label>
                    <select id="jenisKain">
                        <option value="import">Kain Import / Bidang Besar</option>
                        <option value="lokal">Kain Lokal / Bidang Kecil</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Model Gorden</label>
                    <select id="modelGorden">
                        <option value="smokring">Smokring</option>
                        <option value="plisket">Plisket</option>
                        <option value="spiral">Spiral</option>
                        <option value="tabtop">Tab Top</option>
                        <option value="blind">Blind</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Harga Kain per Meter (Rp)</label>
                    <input type="number" id="hargaKainManual">
                </div>

                <!-- Vitrase Toggle -->
                <div class="mb-4" style="border-top: 1px solid #334155; padding-top: 1rem;">
                    <div class="flex items-center justify-between p-3 rounded-xl" style="background: rgba(15, 23, 42, 0.6);">
                        <span class="text-sm font-bold text-white">Tambahkan Vitrase?</span>
                        <label class="flex items-center">
                            <input type="checkbox" id="pakaiVitrase" class="sr-only" onchange="toggleVitrase()">
                            <div class="toggle-bg"></div>
                        </label>
                    </div>

                    <div id="sectionVitrase" class="hidden mt-2 p-3 rounded-xl" style="background: rgba(15, 23, 42, 0.3); border: 1px solid #334155;">
                        <label class="text-xs font-bold text-slate-400 mb-2 block uppercase">Model Vitrase</label>
                        <select id="modelVitrase" onchange="toggleModelVitrase()" class="mb-2">
                            <option value="plisket">Plisket (Menggunakan Rell Vitrase)</option>
                            <option value="spiral">Spiral (Menggunakan Stick)</option>
                        </select>
                        
                        <div id="inputKhususSpiral" class="hidden mb-2" style="display:flex; gap:0.5rem;">
                            <input type="number" id="lebarSpiral" placeholder="Lebar Spiral" style="flex:1;">
                            <input type="number" id="tinggiSpiral" placeholder="Tinggi Spiral" style="flex:1;">
                            <input type="number" id="qtySpiral" value="1" placeholder="Qty" style="flex:1;">
                        </div>
                        
                        <input type="number" id="hargaVitraseManual" placeholder="Harga Vitrase per Meter">
                    </div>
                </div>

                <button type="button" onclick="hitungGorden()" class="btn-hitung"><i class="fa-solid fa-plus"></i> Hitung & Tambahkan Item</button>
            </div>

            <!-- List Antrean -->
            <div class="col-list flex" style="flex-direction: column; justify-content: space-between;">
                <div id="welcomeState" class="border-dashed p-4 text-center flex" style="flex-direction:column; justify-content:center; align-items:center; min-h-[300px]; border-radius:1rem; height:100%;">
                    <i class="fa-solid fa-receipt text-slate-500" style="font-size: 2.5rem; margin-bottom:1rem;"></i>
                    <h3 style="color:#94a3b8; font-weight:700;">Belum Ada Hitungan</h3>
                    <button type="button" onclick="window.location.href='invoice.html'" style="background:transparent; border:1px solid #334155; color:#64748b; margin-top:1rem; padding:0.5rem 1rem; border-radius:0.75rem; cursor:pointer;">Lewati ke Invoice</button>
                </div>

                <div id="resultState" class="bg-slate-800 hidden" style="height:100%; display:flex; flex-direction:column; justify-content:space-between; border-radius:1rem;">
                    <div>
                        <div class="flex justify-between items-center mb-4" style="border-bottom:1px solid #334155; padding-bottom:0.5rem;">
                            <h3 class="text-white font-bold"><i class="fa-solid fa-list-check text-emerald-400"></i> Jendela (<span id="jumlahJendela">0</span>)</h3>
                            <button onclick="resetKeranjang()" style="background:rgba(220,38,38,0.2); border:1px solid #dc2626; color:#fc8181; font-size:11px; padding:2px 6px; border-radius:4px; cursor:pointer;">Reset</button>
                        </div>
                        <div id="detailRincian" style="max-height:250px; overflow-y:auto; gap:0.5rem; display:flex; flex-direction:column;"></div>
                    </div>
                    <div style="border-top:1px solid #334155; padding-top:1rem; margin-top:1rem;">
                        <div style="color:#94a3b8; font-size:12px; font-weight:600;">Total Akumulasi Gorden:</div>
                        <div id="grandTotal" class="text-indigo-400 font-bold" style="font-size:1.75rem; margin-bottom:1rem;">Rp 0</div>
                        <button type="button" onclick="bukaFormInvoice()" class="btn-proses"><i class="fa-solid fa-file-invoice"></i> Buat Invoice Sekarang</button>
                        <button type="button" onclick="window.location.href='invoice.html'" style="background:transparent; border:1px solid #334155; color:#64748b; width:100%; padding:0.5rem; border-radius:0.75rem; margin-top:0.5rem; cursor:pointer; font-size:12px;">Lewati ke Invoice</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let daftarJendela = [];
        const HARGA = { import: 160000, lokal: 70000, vitrase: 100000, smokring: 4500, jahit: 20000, rollet: 65000, rell: 50000, hook: 40000, tali: 50000, stick: 50000, instalasi: 50000 };

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('hargaKainManual').value = HARGA[document.getElementById('jenisKain').value];
            document.getElementById('hargaVitraseManual').value = HARGA.vitrase;
            document.getElementById('jenisKain').addEventListener('change', function() { document.getElementById('hargaKainManual').value = HARGA[this.value]; });
        });

        function toggleVitrase() {
            const section = document.getElementById('sectionVitrase');
            if (document.getElementById('pakaiVitrase').checked) { section.classList.remove('hidden'); toggleModelVitrase(); } 
            else { section.classList.add('hidden'); }
        }

        function toggleModelVitrase() {
            if (document.getElementById('modelVitrase').value === 'spiral' && document.getElementById('pakaiVitrase').checked) {
                document.getElementById('inputKhususSpiral').classList.remove('hidden');
            } else { document.getElementById('inputKhususSpiral').classList.add('hidden'); }
        }

        function formatRupiah(angka) { return "Rp " + Math.round(angka).toLocaleString('id-ID'); }

        function resetKeranjang() { if(confirm("Hapus semua daftar hitungan?")) { daftarJendela = []; renderUIAntrean(); } }

        function hitungGorden() {
            const lebar = parseFloat(document.getElementById('lebar').value);
            const tinggi = parseFloat(document.getElementById('tinggi').value);
            const jenisKain = document.getElementById('jenisKain').value;
            const modelGorden = document.getElementById('modelGorden').value;
            const pakaiVitrase = document.getElementById('pakaiVitrase').checked;
            const modelVitrase = document.getElementById('modelVitrase').value;
            let hargaKainInput = parseFloat(document.getElementById('hargaKainManual').value);
            let hargaVitraseInput = parseFloat(document.getElementById('hargaVitraseManual').value) || 0;

            if (!lebar || !tinggi || isNaN(hargaKainInput)) { alert("Mohon isi ukuran Lebar, Tinggi dan Harga Kain."); return; }

            let totalSatuJendela = 0;

            if (modelGorden === 'blind') {
                totalSatuJendela = (Math.max(1, lebar) * Math.max(1, tinggi) * hargaKainInput) + (Math.max(1, Math.ceil(lebar)) * HARGA.instalasi);
            } else {
                let meterKainUtama = (jenisKain === 'import') ? (lebar + 0.2) * 3 : Math.ceil((lebar + 0.2) / 0.4) * (tinggi + 0.3);
                if (modelGorden === 'tabtop') meterKainUtama += 1;
                totalSatuJendela += (meterKainUtama * hargaKainInput) + (meterKainUtama * HARGA.jahit);

                if (modelGorden === 'smokring') {
                    let jmlSmokring = Math.ceil(lebar * 24); if (jmlSmokring % 2 !== 0) jmlSmokring += 1;
                    totalSatuJendela += (jmlSmokring * HARGA.smokring) + (Math.max(1, Math.ceil(lebar)) * HARGA.rollet) + HARGA.hook + HARGA.tali;
                } else if (modelGorden === 'plisket') {
                    totalSatuJendela += (Math.max(1, Math.ceil(lebar)) * HARGA.rell) + HARGA.hook + HARGA.tali;
                } else if (modelGorden === 'spiral') { totalSatuJendela += HARGA.stick; }
                else if (modelGorden === 'tabtop') { totalSatuJendela += (Math.max(1, Math.ceil(lebar)) * HARGA.rollet) + HARGA.hook + HARGA.tali; }

                if (pakaiVitrase) {
                    if (modelVitrase === 'spiral') {
                        let lSpiral = parseFloat(document.getElementById('lebarSpiral').value) || lebar;
                        let qSpiral = parseInt(document.getElementById('qtySpiral').value) || 1;
                        let meterVitraseSpiral = (lSpiral + 0.2) * 3 * qSpiral;
                        totalSatuJendela += (meterVitraseSpiral * hargaVitraseInput) + (meterVitraseSpiral * HARGA.jahit) + (HARGA.stick * qSpiral * 2);
                    } else {
                        let meterVitrase = (lebar + 0.2) * 3;
                        totalSatuJendela += (meterVitrase * hargaVitraseInput) + (meterVitrase * HARGA.jahit) + (Math.max(1, Math.ceil(lebar)) * HARGA.rell);
                    }
                }
                totalSatuJendela += Math.max(1, Math.ceil(lebar)) * HARGA.instalasi;
            }

            daftarJendela.push({
                nama: `Gorden ${modelGorden.toUpperCase()} (Jndl ${daftarJendela.length + 1})`,
                spesifikasi: `L:${lebar.toFixed(2)}m x T:${tinggi.toFixed(2)}m Bahan:${jenisKain.toUpperCase()}`,
                harga: totalSatuJendela
            });

            renderUIAntrean();
            document.getElementById('lebar').value = ''; document.getElementById('tinggi').value = '';
        }

        function renderUIAntrean() {
            const container = document.getElementById('detailRincian'); container.innerHTML = "";
            let total = 0;
            daftarJendela.forEach(j => {
                total += j.harga;
                container.innerHTML += `
                    <div class="flex justify-between items-center p-2 rounded-xl" style="background:rgba(15,23,42,0.6); border:1px solid #334155;">
                        <div><h4 class="font-bold text-white text-sm" style="margin:0;">${j.nama}</h4><p style="color:#64748b; font-size:11px; margin:0;">${j.spesifikasi}</p></div>
                        <span class="font-bold text-indigo-400 text-sm">${formatRupiah(j.harga)}</span>
                    </div>`;
            });
            document.getElementById('jumlahJendela').innerText = daftarJendela.length;
            document.getElementById('grandTotal').innerText = formatRupiah(total);
            
            if (daftarJendela.length > 0) {
                document.getElementById('welcomeState').classList.add('hidden'); document.getElementById('resultState').classList.remove('hidden');
            } else {
                document.getElementById('welcomeState').classList.remove('hidden'); document.getElementById('resultState').classList.add('hidden');
            }
        }

        function bukaFormInvoice() {
            if (daftarJendela.length === 0) { alert("Belum ada data gorden!"); return; }
            localStorage.setItem('gordenInvoiceData', JSON.stringify(daftarJendela));
            window.location.href = 'invoice.html';
        }
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Gagal:', err));
    });
  }
</script>

</body>
</html>
