<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden - Yeny Gorden</title>
    <style>
        :root {
            --primary: #0f172a;       
            --accent: #9a3412;        
            --bg-light: #f8fafc;
            --text-main: #1e293b;     
            --border: #cbd5e1;        
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 30px 20px;
            background-color: #cbd5e1;
            color: var(--text-main);
        }

        .calc-container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 28px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-title p {
            margin: 5px 0 0 0;
            color: var(--accent);
            font-weight: 600;
            font-style: italic;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: var(--primary);
            color: #ffffff;
            padding: 12px;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            box-sizing: border-box;
            font-weight: 600;
            color: var(--primary);
        }

        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
            background-color: var(--bg-light);
        }

        .align-right {
            text-align: right;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-add {
            background-color: var(--bg-light);
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .btn-delete {
            background: transparent;
            color: #dc2626;
        }

        .bottom-actions {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
        }

        .grand-total-box {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
        }

        .btn-next {
            background-color: var(--accent);
            color: white;
            padding: 12px 30px;
            font-size: 16px;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="header-title">
        <h1>Kalkulator Estimasi Gorden</h1>
        <p>Yeny Gorden Purwokerto</p>
    </div>

    <table id="calc-table">
        <thead>
            <tr>
                <th style="width: 25%;">Nama Item / Ruangan</th>
                <th style="width: 12%;">Lebar (m)</th>
                <th style="width: 12%;">Tinggi (m)</th>
                <th style="width: 15%;">Model Gorden</th>
                <th style="width: 18%;">Harga Bahan /m</th>
                <th style="width: 15%;">Total</th>
                <th style="width: 3%;"></th>
            </tr>
        </thead>
        <tbody>
            <!-- Baris kalkulasi akan masuk di sini -->
        </tbody>
    </table>

    <button class="btn btn-add" onclick="tambahBarisKalkulator()">+ Tambah Item</button>

    <div class="bottom-actions">
        <div class="grand-total-box">
            Total Estimasi: Rp <span id="grand-total-text">0</span>
        </div>
        <button class="btn btn-next" onclick="lanjutKeInvoice()">Lanjut ke Invoice &raquo;</button>
    </div>
</div>

<script>
    // Jalankan satu baris kosong saat pertama kali dibuka
    window.onload = function() {
        tambahBarisKalkulator();
    };

    function tambahBarisKalkulator() {
        const tbody = document.getElementById('calc-table').getElementsByTagName('tbody')[0];
        const row = tbody.insertRow();
        
        row.innerHTML = `
            <td><input type="text" class="nama-item" placeholder="Contoh: Gorden Ruang Tamu"></td>
            <td><input type="number" class="lebar" value="1" min="0" step="0.1" oninput="hitungBaris(this)"></td>
            <td><input type="number" class="tinggi" value="1" min="0" step="0.1" oninput="hitungBaris(this)"></td>
            <td>
                <select class="model" onchange="hitungBaris(this)">
                    <option value="2.8">Smokering (x2.8)</option>
                    <option value="2.5">Plisket (x2.5)</option>
                    <option value="1">Minimalis / Blinds (x1)</option>
                </select>
            </td>
            <td><input type="number" class="harga" value="0" min="0" oninput="hitungBaris(this)"></td>
            <td><input type="number" class="total-harga" value="0" readonly style="text-align: right; background: #f1f5f9;"></td>
            <td><button class="btn btn-delete" onclick="hapusBaris(this)">✕</button></td>
        `;
    }

    function hapusBaris(btn) {
        const row = btn.parentNode.parentNode;
        const tbody = row.parentNode;
        row.remove();
        if (tbody.rows.length === 0) {
            tambahBarisKalkulator();
        }
        hitungGrandTotal();
    }

    function hitungBaris(element) {
        const row = element.parentNode.parentNode;
        const lebar = parseFloat(row.querySelector('.lebar').value) || 0;
        const tinggi = parseFloat(row.querySelector('.tinggi').value) || 0;
        const pengaliModel = parseFloat(row.querySelector('.model').value) || 1;
        const hargaBahan = parseFloat(row.querySelector('.harga').value) || 0;

        let totalItem = 0;

        if (pengaliModel === 1) {
            // Rumus hitung Blinds / minimalis (Luas m2 langsung dikali harga)
            // Jika tinggi atau lebar kurang dari 1 meter, biasanya dihitung minimal 1 meter sesuai aturan toko
            const lEfektif = lebar < 1 && lebar > 0 ? 1 : lebar;
            const tEfektif = tinggi < 1 && tinggi > 0 ? 1 : tinggi;
            totalItem = lEfektif * tEfektif * hargaBahan;
        } else {
            // Rumus Gorden Kain meter lari standar kain tinggi 2.8m
            // Pemakaian bahan = Lebar jendela x Pengali lipatan model gorden
            const pemakaianBahan = lebar * pengaliModel;
            totalItem = pemakaianBahan * hargaBahan;
        }

        row.querySelector('.total-harga').value = Math.round(totalItem);
        hitungGrandTotal();
    }

    function hitungGrandTotal() {
        const rows = document.getElementById('calc-table').getElementsByTagName('tbody')[0].rows;
        let grandTotal = 0;

        for (let i = 0; i < rows.length; i++) {
            const totalRow = parseFloat(rows[i].querySelector('.total-harga').value) || 0;
            grandTotal += totalRow;
        }

        document.getElementById('grand-total-text').innerText = grandTotal.toLocaleString('id-ID');
    }

    function lanjutKeInvoice() {
        const tableRows = document.getElementById("calc-table").getElementsByTagName("tbody")[0].rows;
        let items = [];

        // Loop data untuk mengecek apakah kasir menginput data item baru
        for (let i = 0; i < tableRows.length; i++) {
            const namaItem = tableRows[i].querySelector(".nama-item").value || "";
            const totalHarga = parseFloat(tableRows[i].querySelector(".total-harga").value) || 0;

            // Hanya masukkan item yang terisi nama dan harganya
            if (namaItem.trim() !== "" && totalHarga > 0) {
                items.push({ namaItem: namaItem, totalHarga: totalHarga });
            }
        }

        if (items.length > 0) {
            // Jika ada data terisi, oper ke invoice via localStorage
            localStorage.setItem("invoiceItems", JSON.stringify(items));
        } else {
            // Jika kosong (kasir langsung klik lanjut), bersihkan sisa cache lama agar layar invoice bersih
            localStorage.removeItem("invoiceItems");
        }

        // Alihkan halaman ke screen invoice utama (Kasir tinggal Scan QR nota lama di sana)
        window.location.href = "invoice.html";
    }
</script>

</body>
</html>
