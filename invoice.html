<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Resmi - Yeny Gorden</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./logo.png">
    <meta name="theme-color" content="#9a3412">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #0f172a; --accent: #9a3412; --success: #166534; --border: #94a3b8; --bg-light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; background-color: #cbd5e1; color: #1e293b; }
        
        .invoice-container { max-width: 850px; margin: 0 auto; background: #ffffff; padding: 50px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); position: relative; }
        
        /* Header */
        .invoice-header { display: flex; justify-content: space-between; border-bottom: 3px solid var(--primary); padding-bottom: 30px; margin-bottom: 35px; }
        .brand-section h1 { margin: 0; font-size: 36px; font-weight: 800; color: var(--primary); }
        .invoice-meta-title h2 { margin: 0; color: var(--accent); }
        .meta-inputs input { border: 1px solid #ccc; padding: 4px; width: 150px; }

        /* Form Table */
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; border: 2px solid var(--primary); }
        th { background-color: var(--primary); color: #ffffff; padding: 10px; }
        td { padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td input { width: 100%; border: none; }

        /* Pencarian Manual */
        .manual-search-box { max-width: 850px; margin: 20px auto; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 10px; }
        
        /* Action Bar */
        .action-bar { max-width: 850px; margin: 0 auto; display: flex; justify-content: space-between; gap: 10px; }
        .btn { padding: 12px 20px; font-weight: 700; border-radius: 6px; cursor: pointer; border: none; }
        .btn-scan { background-color: var(--primary); color: #fff; }
        .btn-print { background-color: var(--accent); color: #fff; }
        .btn-add { background-color: #e2e8f0; color: var(--primary); }
    </style>
</head>
<body>

<div class="invoice-container">
    <div class="invoice-header">
        <div class="brand-section">
            <h1>Yeny Gorden</h1>
            <p>Jl. Jendral Sudirman, Purwokerto</p>
        </div>
        <div class="invoice-meta-title">
            <h2>INVOICE</h2>
            <div class="meta-inputs">
                No Nota: <input type="text" id="nota-num" placeholder="No Nota">
            </div>
        </div>
    </div>

    <table id="invoice-table">
        <thead>
            <tr>
                <th>Deskripsi</th>
                <th>Jumlah</th>
                <th>Harga</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Nama Barang"></td>
                <td><input type="number" class="qty" value="0"></td>
                <td><input type="number" class="price" value="0"></td>
                <td><input type="number" class="row-total" value="0" readonly></td>
            </tr>
        </tbody>
    </table>
</div>

<!-- TOMBOL PENCARIAN MANUAL -->
<div class="manual-search-box">
    <input type="text" id="manual-nota-input" placeholder="Masukkan nomor nota untuk mencari..." style="flex:1; padding: 8px;">
    <button class="btn btn-scan" onclick="cariNotaManual()">Cari Nota</button>
</div>

<!-- TOMBOL AKSI -->
<div class="action-bar">
    <div>
        <button class="btn btn-scan" onclick="toggleScanner()">Mode Kasir: Scan QR</button>
        <button class="btn btn-add" onclick="addNewRow()">+ Tambah Baris</button>
    </div>
    <button class="btn btn-print" onclick="window.print()">Cetak / Simpan PDF</button>
</div>

<script>
    // Fungsi Pencarian Manual
    function cariNotaManual() {
        const nota = document.getElementById('manual-nota-input').value.trim();
        if (!nota) { alert("Masukkan nomor nota!"); return; }
        
        // Sesuaikan URL_WEB_APP dengan URL Google Script Anda
        fetch(`${URL_WEB_APP}?action=getNota&nota=${nota}`)
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                alert("Nota ditemukan!");
                // Panggil fungsi pengisian form Anda di sini
                // isiDataKeForm(data.data);
            } else {
                alert("Nota tidak ditemukan.");
            }
        })
        .catch(err => alert("Gagal mengambil data."));
    }

    // Enter Key Listener
    document.getElementById('manual-nota-input').addEventListener("keyup", (e) => {
        if (e.key === "Enter") cariNotaManual();
    });

    function addNewRow() { /* Kode tambah baris Anda */ }
    function toggleScanner() { /* Kode buka scanner Anda */ }
</script>

</body>
</html>
